<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ماشین حساب نساجی (پارسیانیک)</title>
<meta name="theme-color" content="#17263C">
<meta name="description" content="ماشین حساب نساجی گروه پارسیانیک">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icons/parsianik-192.png">
<link rel="apple-touch-icon" sizes="192x192" href="icons/parsianik-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="icons/parsianik-512.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<!-- <style> Internal CSS Styles </style> -->
</head>
<body>
<!-- Mobile-only: PWA install banner prompt -->
<div id="install-banner" style="
  display:none; position:fixed; bottom:0; left:0; right:0;
  background:#17263C; color:#fff; padding:14px 18px;
  align-items:center; justify-content:space-between;
  gap:12px; z-index:999; font-family:Vazirmatn,sans-serif;
  font-size:13px; border-top:2px solid #C17826;">
  <span>📲 این ابزار را نصب کنید</span>
  <div style="display:flex;gap:8px;flex-shrink:0;">
    <button id="install-btn" style="
      background:#C17826; color:#fff; border:none;
      border-radius:6px; padding:7px 14px; font-family:Vazirmatn,sans-serif;
      font-size:13px; font-weight:700; cursor:pointer;">نصب</button>
    <button id="install-dismiss" style="
      background:transparent; color:rgba(255,255,255,.6);
      border:1px solid rgba(255,255,255,.2); border-radius:6px;
      padding:7px 10px; font-family:Vazirmatn,sans-serif;
      font-size:12px; cursor:pointer;">بعداً</button>
  </div>
</div>

<div class="app">

  <!-- Mobile-only: hamburger toggle -->
  <button class="hamburger" id="hamburger" aria-label="باز کردن منو">
    <span></span><span></span><span></span>
  </button>

  <!-- Mobile-only: dim backdrop behind the drawer -->
  <div class="overlay" id="overlay"></div>

  <!-- ═══════════════════ SIDEBAR ═══════════════════ -->
  <aside class="sidebar" id="sidebar">
    <div class="s-head">
      <div class="brand">
        <div class="brand-mark">
          <!-- Bobbin / spool icon -->
          <!-- <svg viewBox="0 0 22 22" fill="none"> -->
            <!-- <ellipse cx="11" cy="5"  rx="6" ry="2.2" stroke="white" stroke-width="1.6"/> -->
            <!-- <ellipse cx="11" cy="17" rx="6" ry="2.2" stroke="white" stroke-width="1.6"/> -->
            <!-- <line x1="5" y1="5" x2="5"  y2="17" stroke="white" stroke-width="1.6"/> -->
            <!-- <line x1="17" y1="5" x2="17" y2="17" stroke="white" stroke-width="1.6"/> -->
          <!-- </svg> -->
		  <!-- Parsianik logo -->
		  <img src="icons/parsianik-512.png" alt="Parsianik">
        </div>
        <div>
          <div class="brand-name">ماشین حساب نساجی</div>
          <div class="brand-sub">۱۵ فرمول · ۴ دسته‌بندی</div>
        </div>
      </div>
    </div>
    <nav id="nav"></nav>
  </aside>

  <!-- ═══════════════════ CONTENT ═══════════════════ -->
  <main class="content" id="main">
    <div class="welcome">
      <div class="welcome-glyph">◈</div>
      <h2>یک فرمول انتخاب کنید</h2>
      <p>از منوی سمت راست، دسته‌بندی و فرمول مورد نظر را انتخاب کنید</p>
	  <h5>کاری از گروه نیکنام تخصص پارسیان (پارسیانیک)</h5>
    </div>
  </main>

</div><!-- .app -->

<script src="formulas.js"></script>
<script src="app.js"></script>
</body>
</html>
